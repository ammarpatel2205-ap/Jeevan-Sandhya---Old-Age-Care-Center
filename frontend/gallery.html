<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
</head>
<style>
    body{
        margin: 0;
        padding: 0;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
    }
    .title{
    text-align: center;
    margin: 0 auto 80px;
    position: relative;
    line-height: 60px;
    color: #555;
}

.title::after{
    content: '';
    background: #ff523b;
    width: 80px;
    height: 5px;
    border-radius: 5px;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
}


.gallery{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
.section{
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        margin-top: 100px;
    }
.images{
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
    }
.image{
        width: 100%;
        max-width: 200px;
        height: auto;
        transition: transform 0.3s ease-in-out;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgb(0, 0, 0, 0.3);
    }
.image:hover{
        transform: scale(1.2);
    }
.small-container{
    max-width: 1080px;
    margin: auto;
    padding-left: 25px;
    padding-right: 25px;
}

</style>
<body>
    <div class="small-container">
        <h2 class="title">Gallery</h2>    
    <div class="galley">
        <div class="section" id="section1">
            <div class="images">
              <img src="pics/a1.jpg" alt="" class="image">
              <img src="pics/a2.jpg" alt="" class="image">
              <img src="pics/a3.jpg" alt="" class="image">
              <img src="pics/a4.jpg" alt="" class="image">
            </div>
        </div>
        <div class="section" id="section2">
            <div class="images">
            <img src="pics/a5.jpg" alt="" class="image">
              <img src="pics/a6.jpg" alt="" class="image">
              <img src="pics/a7.jpg" alt="" class="image">
              <img src="pics/a8.jpg" alt="" class="image">
            </div>  
        </div>
        
    </div>
 </div>
</body>
</html>
