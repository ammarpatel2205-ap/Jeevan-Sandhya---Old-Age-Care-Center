<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthcare Management</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #ececec;
        padding: 20px;
      }

      .container {
        width: 80%;
        margin: auto;
        background: #fff;
        padding: 18px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      h1 {
        font-size: 18px;
        margin-bottom: 15px;
      }

      h2 {
        font-size: 16px;
        margin: 18px 0 12px;
      }

      /* Form */
      .form-group {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }

      .form-group input {
        height: 38px;
        padding: 0 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 13px;
      }

      #name {
        width: 20%;
      }
      #condition {
        width: 20%;
      }
      #medicine {
        width: 20%;
      }
      #doctor {
        width: 20%;
      }

      .add-btn {
        width: 20%;
        height: 38px;
        border: none;
        border-radius: 5px;
        background: #2fa4ab;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }

      /* Table */
      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #2fa4ab;
        color: #fff;
        padding: 10px;
        font-size: 13px;
      }

      td {
        padding: 10px;
        text-align: center;
        font-size: 13px;
        border-bottom: 1px solid #eee;
      }

      /* Buttons */
      .delete-btn {
        background: #ef4b3f;
        color: #fff;
        border: none;
        padding: 5px 10px;
        font-size: 12px;
        border-radius: 4px;
        cursor: pointer;
        margin-right: 5px;
      }

      .edit-btn {
        background: #f3a000;
        color: #fff;
        border: none;
        padding: 5px 10px;
        font-size: 12px;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Healthcare Management</h1>

      <div class="form-group">
        <input type="text" id="name" placeholder="Resident Name" />
        <input type="text" id="condition" placeholder="Health Condition" />
        <input type="text" id="medicine" placeholder="Medicine" />
        <input type="text" id="doctor" placeholder="Doctor Name" />
        <button class="add-btn" onclick="addRecord()">Add</button>
      </div>

      <h2>Health Records</h2>

      <table id="healthTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Condition</th>
            <th>Medicine</th>
            <th>Doctor</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Ramesh Patel</td>
            <td>BP</td>
            <td>Amlodipine</td>
            <td>Dr. Shah</td>
            <td>
              <button class="delete-btn" onclick="deleteRow(this)">
                Delete
              </button>
              <button class="edit-btn" onclick="editRow(this)">Edit</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      function addRecord() {
        let name = document.getElementById("name").value;
        let condition = document.getElementById("condition").value;
        let medicine = document.getElementById("medicine").value;
        let doctor = document.getElementById("doctor").value;

        if (name == "" || condition == "" || medicine == "" || doctor == "") {
          alert("Fill all fields");
          return;
        }

        let table = document
          .getElementById("healthTable")
          .getElementsByTagName("tbody")[0];
        let row = table.insertRow();

        row.innerHTML = `
<td>${name}</td>
<td>${condition}</td>
<td>${medicine}</td>
<td>${doctor}</td>
<td>
<button class="delete-btn" onclick="deleteRow(this)">Delete</button>
<button class="edit-btn" onclick="editRow(this)">Edit</button>
</td>
`;

        document.getElementById("name").value = "";
        document.getElementById("condition").value = "";
        document.getElementById("medicine").value = "";
        document.getElementById("doctor").value = "";
      }

      function deleteRow(btn) {
        btn.parentElement.parentElement.remove();
      }

      function editRow(btn) {
        let row = btn.parentElement.parentElement;

        let name = prompt("Edit Name", row.cells[0].innerText);
        let condition = prompt("Edit Condition", row.cells[1].innerText);
        let medicine = prompt("Edit Medicine", row.cells[2].innerText);
        let doctor = prompt("Edit Doctor", row.cells[3].innerText);

        if (name && condition && medicine && doctor) {
          row.cells[0].innerText = name;
          row.cells[1].innerText = condition;
          row.cells[2].innerText = medicine;
          row.cells[3].innerText = doctor;
        }
      }
    </script>
  </body>
</html>
